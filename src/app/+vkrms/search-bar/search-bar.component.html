<div class="vk-pagetitle">
  {{option.pagetitle}}
  <span class="vk-subtitle" *ngIf="option.subtitle">Example:<a href="https://www.ag-grid.com/example.php" >{{option.subtitle}}</a></span>
</div>
  <div class="form-group row">
    <div class="col-xs-3">
      <label for="exampleInputEmail1" class="sr-only">Id</label>
      <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter id" [(ngModel)] = "id">
    </div>
    <div class="col-xs-3">
      <label for="exampleInputPassword1" class="sr-only">Name</label>
      <input type="text" class="form-control" id="exampleInputPassword1" placeholder="Name" [(ngModel)] = "name">
    </div>
    <div class="col-xs-3">
      <label for="exampleSelect1" class="sr-only">Example select</label>
      <select class="form-control" id="exampleSelect1">
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
    </select>
    </div>
    <div class="col-xs-3">
      <button type="submit" class="btn btn-info" (click) = "onSearch()">查询</button>
    </div>
  </div>
