<div class="container">
  <div [hidden]="submitted">
    <h1>Login Form</h1>
    <form (ngSubmit)="onSubmit()" #userForm="ngForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" class="form-control" id="name" required [(ngModel)]="model.name" name="name" #name="ngModel">
        <div [hidden]="name.valid || name.pristine" class="alert alert-danger">
          Name is required
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" [(ngModel)]="model.password" name="password">
      </div>
      <div class="form-group">
        <label for="tel">Tel</label>
        <input type="text" class="form-control" id="tel" required [(ngModel)]="model.tel" name="tel" #Tel="ngModel" required #tel="ngModel">
        <div [hidden]="tel.valid || tel.pristine" class="alert alert-danger">
          Tel is required
        </div>
      </div>
      <div class="form-group">
        <label for="company">Company</label>
        <select class="form-control" id="company" required [(ngModel)]="model.company" name="company">
          <option *ngFor="let company of companies" [value]="company">{{company}}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="interest">Interest</label>
        <select class="form-control" id="interest" required [(ngModel)]="model.interest" name="interest">
          <option *ngFor="let interest of interests" [value]="interest">{{interest}}</option>
        </select>
      </div>
      <button type="submit" class="btn btn-default" [disabled]="!userForm.form.valid">Submit</button>
      <button type="button" class="btn btn-danger" (click)="userForm.reset()">Reset</button>
    </form>
  </div>
  <div [hidden]="!submitted">
    <h2>You submitted the following:</h2>
    <div class="row">
      <div class="col-xs-3">Name</div>
      <div class="col-xs-9  pull-left">{{ model.name }}</div>
    </div>
    <div class="row">
      <div class="col-xs-3">Password</div>
      <div class="col-xs-9 pull-left">{{ model.password }}</div>
    </div>
    <div class="row">
      <div class="col-xs-3">Company</div>
      <div class="col-xs-9 pull-left">{{ model.company }}</div>
    </div>
    <div class="row">
      <div class="col-xs-3">Interest</div>
      <div class="col-xs-9 pull-left">{{ model.interest }}</div>
    </div>
    <br>
    <button class="btn btn-default" (click)="submitted=false">Edit</button>
  </div>
</div>
