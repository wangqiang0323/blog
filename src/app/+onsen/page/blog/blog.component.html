<ons-page>
  <ons-toolbar>
    <div class="left">
      <ons-back-button (click)="back()">Back</ons-back-button>
    </div>
    <div class="center">Title</div>
    <div class="right">
      <ons-toolbar-button>
        <ons-icon icon="md-menu"></ons-icon>
      </ons-toolbar-button>
    </div>
  </ons-toolbar>
  <div class="background"></div>
  <div class="content">
    <ons-list>
      <ons-list-header>Header</ons-list-header>
      <ons-list-item>
        <div class="left">
          <ons-icon icon="md-face" class="list__item__icon"></ons-icon>
        </div>
        <div class="center">
          <span class="list__item__title">Title</span>
          <span class="list__item__subtitle">Subtitle</span>
        </div>
        <label class="right">
          <ons-switch></ons-switch>
        </label>
      </ons-list-item>
    </ons-list>
  </div>
</ons-page>
