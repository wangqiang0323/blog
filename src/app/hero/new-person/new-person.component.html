<div class="container-fluid new-person-container">
  <div class="row">
    <div class="col-sm-12">
      <h1>新增人员</h1>
      <hr>
    </div>
  </div>
  <div class="row modal-body">
    <div class="col-xs-12">
        <div class="form-group row">
          <label for="" class="col-xs-2 col-form-label">Id</label>
          <div class="col-xs-10">
            <input type="number" class="form-control" id="" placeholder="Enter Id" [(ngModel)]="id" name="id">
            <small id="emailHelp" class="form-text text-muted">We'll never share your id with anyone else.</small>
          </div>
        </div>
        <div class="form-group row">
          <label for="" class="col-xs-2 col-form-label">Name</label>
          <div class="col-xs-10">
            <input type="text" class="form-control" id="" placeholder="Name" [(ngModel)]="name" name="name">
          </div>
        </div>
        <div class="form-group row">
          <label for="" class="col-xs-2 col-form-label">Age</label>
          <div class="col-xs-10">
            <input type="text" class="form-control" id="" placeholder="Age" [(ngModel)]="age" name="age">
          </div>
        </div>
    </div>
  </div>
  <hr>
  <div class="row">
    <div class="col-xs-12">
      <div class="float-xs-right">
        <button type="type" class="btn btn-primary" (click)="ok()">ok</button>
        <button type="type" class="btn btn-info" (click)="close()">close</button>
      </div>
    </div>
  </div>
</div>
